<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 120" fill="none">
  <defs>
    <linearGradient id="bt-strap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a05848"/>
      <stop offset="0.45" stop-color="#c97c6d"/>
      <stop offset="1" stop-color="#8a3d2f"/>
    </linearGradient>
    <linearGradient id="bt-tassel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d68f7e"/>
      <stop offset="1" stop-color="#8a3d2f"/>
    </linearGradient>
  </defs>
  <!-- strap -->
  <rect x="14" y="0" width="12" height="84" fill="url(#bt-strap)"/>
  <line x1="20" y1="0" x2="20" y2="84" stroke="#f6f0dd" stroke-width="0.4" stroke-dasharray="2 3" opacity="0.6"/>
  <!-- knot -->
  <ellipse cx="20" cy="86" rx="9" ry="5" fill="#6b2f24"/>
  <ellipse cx="20" cy="85" rx="8" ry="3.5" fill="#8a3d2f"/>
  <!-- tassel cap -->
  <path d="M11 90 Q20 86 29 90 L27 96 Q20 92 13 96 Z" fill="#6b2f24"/>
  <!-- fringe -->
  <g fill="url(#bt-tassel)">
    <rect x="11" y="94" width="1.8" height="22" rx="0.9"/>
    <rect x="14" y="94" width="1.8" height="24" rx="0.9"/>
    <rect x="17" y="94" width="1.8" height="26" rx="0.9"/>
    <rect x="20" y="94" width="1.8" height="26" rx="0.9"/>
    <rect x="23" y="94" width="1.8" height="24" rx="0.9"/>
    <rect x="26" y="94" width="1.8" height="22" rx="0.9"/>
  </g>
</svg>
