<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- main band -->
  <path d="M0 18 H200 V36 H0 Z" fill="#b94a4a"/>
  <!-- folds shadow -->
  <path d="M0 18 H200 V22 H0 Z" fill="#8a3a3a" opacity="0.5"/>
  <path d="M0 32 H200 V36 H0 Z" fill="#8a3a3a" opacity="0.35"/>
  <!-- stitching -->
  <line x1="0" y1="22" x2="200" y2="22" stroke="#f6f0dd" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.7"/>
  <line x1="0" y1="32" x2="200" y2="32" stroke="#f6f0dd" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.7"/>
  <!-- center medallion -->
  <g transform="translate(100 27)">
    <circle r="12" fill="#f6f0dd" stroke="#8a3a3a" stroke-width="0.8"/>
    <circle r="8" fill="none" stroke="#b94a4a" stroke-width="0.6" opacity="0.7"/>
    <path d="M-4 0 L-1 3 L4 -3" stroke="#8a3a3a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- hanging tail -->
  <path d="M84 36 L84 52 L92 46 L100 52 L100 36 Z" fill="#b94a4a"/>
  <path d="M100 36 L100 52 L108 46 L116 52 L116 36 Z" fill="#a73e3e"/>
</svg>
