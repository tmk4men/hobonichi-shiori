<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 110" fill="none">
  <!-- shelf line -->
  <line x1="12" y1="92" x2="308" y2="92" stroke="#a08a64" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- pen cup -->
  <g transform="translate(24 36)">
    <rect x="0" y="14" width="40" height="42" rx="4" fill="#d6a26a" stroke="#8a5a32" stroke-width="0.8"/>
    <rect x="0" y="14" width="40" height="6" rx="3" fill="#b88454" opacity="0.6"/>
    <!-- pens -->
    <g>
      <rect x="6" y="-10" width="4" height="32" rx="1.5" fill="#4a8aaa"/>
      <polygon points="6,-12 10,-12 8,-16" fill="#3a6a86"/>
      <rect x="14" y="-4" width="4" height="26" rx="1.5" fill="#c95959"/>
      <polygon points="14,-6 18,-6 16,-10" fill="#8a3a3a"/>
      <rect x="22" y="-8" width="4" height="30" rx="1.5" fill="#6b8048"/>
      <polygon points="22,-10 26,-10 24,-14" fill="#3a5a2c"/>
      <rect x="30" y="-2" width="4" height="24" rx="1.5" fill="#d8b86a"/>
      <polygon points="30,-4 34,-4 32,-8" fill="#8a6a26"/>
    </g>
  </g>

  <!-- scissors -->
  <g transform="translate(96 62)">
    <circle cx="6" cy="14" r="6" fill="none" stroke="#6b5a45" stroke-width="1.6"/>
    <circle cx="6" cy="28" r="6" fill="none" stroke="#6b5a45" stroke-width="1.6"/>
    <path d="M10 12 L34 -6 L36 -4 L18 18 Z" fill="#c8baa0" stroke="#6b5a45" stroke-width="0.8"/>
    <path d="M10 30 L34 48 L36 46 L18 24 Z" fill="#c8baa0" stroke="#6b5a45" stroke-width="0.8"/>
    <circle cx="20" cy="21" r="1.4" fill="#6b5a45"/>
  </g>

  <!-- tape dispenser -->
  <g transform="translate(150 50)">
    <path d="M0 30 Q0 6 24 6 Q48 6 48 30 L42 30 Q42 12 24 12 Q6 12 6 30 Z" fill="#e6a8a0" stroke="#a85a52" stroke-width="0.8"/>
    <circle cx="24" cy="22" r="6" fill="#f6f0dd" stroke="#a85a52" stroke-width="0.8"/>
    <rect x="42" y="26" width="14" height="6" fill="#f0e2c4" stroke="#a85a52" stroke-width="0.6"/>
    <line x1="42" y1="29" x2="56" y2="29" stroke="#a85a52" stroke-width="0.4" stroke-dasharray="1 2"/>
  </g>

  <!-- stamp -->
  <g transform="translate(214 56)">
    <rect x="0" y="20" width="42" height="12" rx="2" fill="#8a3a3a"/>
    <rect x="6" y="6" width="30" height="16" rx="2" fill="#b94a4a"/>
    <rect x="12" y="0" width="18" height="8" rx="1.4" fill="#6b2f24"/>
    <line x1="0" y1="34" x2="42" y2="34" stroke="#6b2f24" stroke-width="0.6"/>
  </g>

  <!-- notebook -->
  <g transform="translate(266 46)">
    <rect x="0" y="0" width="38" height="46" rx="2" fill="#c8b48a" stroke="#6b5a45" stroke-width="0.8"/>
    <rect x="0" y="0" width="6" height="46" fill="#a89160"/>
    <line x1="14" y1="14" x2="32" y2="14" stroke="#6b5a45" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.6"/>
    <line x1="14" y1="22" x2="32" y2="22" stroke="#6b5a45" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.6"/>
    <line x1="14" y1="30" x2="28" y2="30" stroke="#6b5a45" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.6"/>
  </g>

  <!-- sparkle -->
  <g fill="#a08a64" opacity="0.55">
    <path d="M132 18 L134 22 L138 24 L134 26 L132 30 L130 26 L126 24 L130 22 Z"/>
  </g>
</svg>
