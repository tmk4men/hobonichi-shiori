<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" fill="none">
  <!-- frame -->
  <rect x="10" y="14" width="40" height="58" rx="6" fill="#8a5a3a" stroke="#4a2818" stroke-width="0.9"/>
  <rect x="14" y="18" width="32" height="50" rx="3" fill="#f6e8a0" stroke="#6b4226" stroke-width="0.6"/>
  <!-- top knob -->
  <rect x="22" y="6" width="16" height="10" rx="3" fill="#8a5a3a" stroke="#4a2818" stroke-width="0.6"/>
  <rect x="26" y="0" width="2" height="6" fill="#4a2818"/>
  <rect x="32" y="0" width="2" height="6" fill="#4a2818"/>
  <!-- face -->
  <circle cx="30" cy="36" r="11" fill="#fffaea" stroke="#6b4226" stroke-width="0.7"/>
  <g stroke="#6b4226" stroke-width="0.7" stroke-linecap="round">
    <line x1="30" y1="27" x2="30" y2="29"/>
    <line x1="39" y1="36" x2="37" y2="36"/>
    <line x1="30" y1="45" x2="30" y2="43"/>
    <line x1="21" y1="36" x2="23" y2="36"/>
  </g>
  <!-- hands -->
  <line x1="30" y1="36" x2="30" y2="29" stroke="#3a2f23" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="30" y1="36" x2="35" y2="38" stroke="#3a2f23" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="30" cy="36" r="1.2" fill="#3a2f23"/>
  <!-- pendulum window -->
  <rect x="20" y="52" width="20" height="14" rx="2" fill="#3a2f23" opacity="0.18"/>
  <circle cx="30" cy="62" r="4" fill="#d8b86a" stroke="#6b4226" stroke-width="0.5"/>
  <line x1="30" y1="46" x2="30" y2="58" stroke="#6b4226" stroke-width="0.6"/>
</svg>
