<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <defs>
    <linearGradient id="wh-desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9d9b5"/>
      <stop offset="1" stop-color="#c8b48a"/>
    </linearGradient>
    <linearGradient id="wh-book" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f0dd"/>
      <stop offset="1" stop-color="#ece4ca"/>
    </linearGradient>
    <linearGradient id="wh-cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcf7e6"/>
      <stop offset="1" stop-color="#e5d6ad"/>
    </linearGradient>
  </defs>

  <!-- desk -->
  <rect x="0" y="140" width="320" height="60" fill="url(#wh-desk)"/>
  <path d="M0 140 H320" stroke="#a08a64" stroke-width="0.8" opacity="0.6"/>

  <!-- open book -->
  <g transform="translate(70 70)">
    <!-- shadow -->
    <ellipse cx="90" cy="86" rx="92" ry="6" fill="#6b5a45" opacity="0.18"/>
    <!-- cover -->
    <path d="M2 80 Q90 64 178 80 L172 18 Q90 4 8 18 Z" fill="#b87a55" stroke="#6b4226" stroke-width="1"/>
    <!-- pages -->
    <path d="M10 76 Q90 60 170 76 L166 22 Q90 10 14 22 Z" fill="url(#wh-book)" stroke="#a08a64" stroke-width="0.8"/>
    <!-- spine -->
    <path d="M88 12 Q90 44 88 78" stroke="#a08a64" stroke-width="1" opacity="0.6"/>
    <!-- text lines left -->
    <g stroke="#9a8460" stroke-width="0.8" stroke-linecap="round" stroke-dasharray="2 3" opacity="0.7">
      <line x1="22" y1="32" x2="78" y2="28"/>
      <line x1="22" y1="42" x2="78" y2="38"/>
      <line x1="22" y1="52" x2="70" y2="48"/>
      <line x1="22" y1="62" x2="76" y2="58"/>
    </g>
    <!-- text lines right -->
    <g stroke="#9a8460" stroke-width="0.8" stroke-linecap="round" stroke-dasharray="2 3" opacity="0.7">
      <line x1="100" y1="28" x2="156" y2="32"/>
      <line x1="100" y1="38" x2="156" y2="42"/>
      <line x1="100" y1="48" x2="148" y2="52"/>
    </g>
    <!-- ribbon -->
    <path d="M120 12 L120 96 L114 90 L108 96 L108 14 Z" fill="#c75959" stroke="#8a3a3a" stroke-width="0.6"/>
  </g>

  <!-- pen -->
  <g transform="translate(184 96) rotate(28)">
    <rect x="0" y="0" width="76" height="6" rx="3" fill="#4a4032"/>
    <rect x="0" y="0" width="46" height="6" rx="3" fill="#6b5a45"/>
    <polygon points="76,0 86,3 76,6" fill="#c9a96a"/>
    <circle cx="84" cy="3" r="1.2" fill="#3a2f23"/>
    <rect x="20" y="-1.4" width="2" height="8.8" fill="#c9a96a"/>
  </g>

  <!-- cup of tea -->
  <g transform="translate(34 110)">
    <ellipse cx="22" cy="32" rx="22" ry="4" fill="#6b5a45" opacity="0.15"/>
    <path d="M2 8 Q2 28 22 30 Q42 28 42 8 Z" fill="url(#wh-cup)" stroke="#a08a64" stroke-width="0.9"/>
    <ellipse cx="22" cy="8" rx="20" ry="4" fill="#8a5a3a" opacity="0.85"/>
    <ellipse cx="22" cy="7" rx="14" ry="2.4" fill="#6b3e25"/>
    <path d="M42 12 Q54 14 52 22 Q50 28 42 26" fill="none" stroke="#a08a64" stroke-width="1.2"/>
    <!-- steam -->
    <g stroke="#b8a37c" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.55">
      <path d="M14 -2 Q18 -8 14 -14 Q10 -20 14 -26"/>
      <path d="M22 -4 Q26 -10 22 -16 Q18 -22 22 -28"/>
      <path d="M30 -2 Q34 -8 30 -14 Q26 -20 30 -26"/>
    </g>
  </g>

  <!-- soft leaf -->
  <g transform="translate(252 134)">
    <path d="M0 0 Q14 -10 28 0 Q14 10 0 0 Z" fill="#a8b878" opacity="0.8"/>
    <path d="M4 0 Q14 -2 24 0" stroke="#6b8048" stroke-width="0.6" fill="none"/>
  </g>
</svg>
