<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" shape-rendering="crispEdges">
  <defs>
    <!-- 細かい粒（紙のキメ） -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.40  0 0 0 0 0.30  0 0 0 0 0.18  0 0 0 0.11 0"/>
    </filter>
    <!-- 横方向の繊維（パルプ繊維の流れ） -->
    <filter id="fiberH">
      <feTurbulence type="turbulence" baseFrequency="0.018 0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.46  0 0 0 0 0.33  0 0 0 0 0.18  0 0 0 0.045 0"/>
    </filter>
    <!-- 短い縦繊維（重ねて生っぽさを足す） -->
    <filter id="fiberV">
      <feTurbulence type="turbulence" baseFrequency="0.9 0.018" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.52  0 0 0 0 0.40  0 0 0 0 0.24  0 0 0 0.028 0"/>
    </filter>
    <!-- やわらかい色斑（紙の漂白むら） -->
    <filter id="blotch">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.42  0 0 0 0 0.22  0 0 0 0.05 0"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" filter="url(#blotch)"/>
  <rect width="100%" height="100%" filter="url(#fiberH)"/>
  <rect width="100%" height="100%" filter="url(#fiberV)"/>
  <rect width="100%" height="100%" filter="url(#grain)"/>
</svg>
